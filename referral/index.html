        const slug = parts[parts.length - 1];

        // Aggiungi qui i tuoi link in futuro (es: 'nome': 'link')

            "amazon": "https://www.amazon.it/index.html?tag=onlymaus-21",
            "discord": "https://discord.gg/AwZ3Sa2m8f",
            "telegram": "https://t.me/+t2VmbKd9WKwzNzJk",
            "store": "https://mausstore.it"
        };

        // Se l'utente scrive mausstore.it/referral/NOME, va al link corrispondente
        // Altrimenti torna alla home dello store
        let targetUrl = links[slug] || "https://mausstore.it";

        window.location.href = targetUrl;
    </script>
</head>
