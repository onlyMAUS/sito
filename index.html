<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it - Braceria Slim</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 RESET E STOP SCROLLBAR */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* Blocca scorrimento ovunque */
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 📸 SCENOGRAFIA DINAMICA (Sfondo) */
        .scena {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 🏗️ CONTENITORE GENERALE (Ancorato al centro della foto) */
        .wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%); /* Centrato sopra il camino */
            width: 100%; max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        /* 🥩 TESTATA BLINDATA (Proporzionale) */
        .header-box {
            position: absolute;
            top: 5vh; /* Allineata tra i coni di luce superiori */
            width: 450px; height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        .img-testata { width: 85%; z-index: 11; object-fit: contain; }

        /* 📐 AREA PULSANTI COMPATTA (Coordinate fisse in pixel) */
        .area-pulsanti {
            position: absolute;
            top: 55%; /* Spostato per stare sotto la testata */
            width: 900px; /* Larghezza fissa per contenere i pulsanti ai lati del camino */
            height: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spaziatura ridotta tra i pulsanti */
            width: 220px; /* 🧱 CORNICE DEI PULSANTI RIDOTTA COSI' È PIU' PICCOLA */
            pointer-events: auto;
        }

        /* 🧱 IL VUOTO PER IL CAMINO CENTRALE */
        .spacer-camino {
            width: 350px; /* Muro invisibile sopra il camino */
            flex-shrink: 0;
        }

        /* 🔘 STILE PULSANTI (Scala ridotta) */
        .btn {
            position: relative;
            width: 100%; height: 70px; /* Altezza ridotta dei pulsanti */
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            overflow: hidden;
            border-radius: 10px;
        }
        .btn:hover { transform: scale(1.05); }

        /* 🎨 GLOW E COLORI */
        .btn::before {
            content: ''; position: absolute;
            top: 25%; left: 20%; right: 20%; bottom: 25%;
            z-index: 1; opacity: 0.7; filter: blur(12px);
            background: radial-gradient(circle, var(--glow), transparent 70%);
        }
        .c-amazon   { --glow: #ff9900; }
        .c-twitch   { --glow: #9146ff; }
        .c-discord  { --glow: #5865f2; }
        .c-telegram { --glow: #0088cc; }
        .c-verde    { --glow: #2ecc71; } /* Verde 100 Euro */

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 11px; /* Testo più piccolo */
            text-shadow: 2px 2px 4px #000;
            line-height: 1.2;
        }

        .cornice-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER */
        .footer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.85); padding: 10px 0;
            text-align: center; font-size: 10px; color: #aaa;
            z-index: 20; border-top: 1px solid #333;
        }

        /* MOBILE FIX */
        @media (max-width: 900px) {
            html, body { overflow-y: auto; }
            .wrapper { position: relative; top: 0; left: 0; transform: none; height: auto; display: flex; flex-direction: column; align-items: center; padding-top: 150px; }
            .area-pulsanti { position: relative; top: 0; flex-direction: column; align-items: center; width: 100%; height: auto; margin-top: 40px; }
            .column { width: 100%; max-width: 220px; margin-bottom: 20px; }
            .spacer-camino { display: none; }
            .footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="scena"></div>

    <div class="wrapper">
        <div class="header-box">
            <img src="img/testata.png" class="img-testata" alt="M4USS Braceria">
            <img src="img/cornice.png" class="cornice-img" alt="Cornice">
        </div>

        <div class="area-pulsanti">
            <div class="column">
                <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn c-amazon">
                    <span class="btn-text">!amazon</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn c-amazon">
                    <span class="btn-text">!setup</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://streamelements.com/only_maus/tip" target="_blank" class="btn c-verde">
                    <span class="btn-text">💰 !donazione 💰</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
            </div>

            <div class="spacer-camino"></div>

            <div class="column">
                <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn c-twitch">
                    <span class="btn-text">Twitch</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn c-discord">
                    <span class="btn-text">🥩 Discord 🥩<br>!discord</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn c-telegram">
                    <span class="btn-text">🍳 Telegram 🍳<br>!telegram</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
            </div>
        </div>

        <div class="footer">
            In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
            Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
        </div>
    </div>

</body>
</html>
