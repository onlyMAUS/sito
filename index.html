<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it - Braceria</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 RESET E ELIMINAZIONE BARRE */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* Elimina scrollbar ovunque */
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 📸 SCENOGRAFIA DINAMICA (Sfondo) */
        .wrapper {
            position: relative;
            width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🥩 TESTATA ANCORATA IN ALTO (Scala ridotta) */
        .header-container {
            position: absolute;
            top: 5vh; /* Distanza dall'alto basata sull'altezza monitor */
            width: 60%; max-width: 320px; /* Scala ridotta della testata */
            height: auto;
            z-index: 10;
        }
        .img-testata { width: 85%; position: relative; z-index: 11; height: auto; display: block; margin: 0 auto;}

        /* 📐 AREA PULSANTI ELASTICA (Sopra il camino) */
        .content-area {
            position: absolute;
            top: 30vh; /* Allineamento sopra il camino centrale */
            width: 90%;
            max-width: 1000px; /* Contenitore più compatto */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spaziatura ridotta tra i pulsanti */
            width: 45%; max-width: 250px; /* Scala ridotta dei pulsanti */
        }

        /* 🧱 IL CUSCINETTO CENTRALE (Libera il camino) */
        .camino-spacer {
            flex: 1;
            max-width: 300px; /* Spazio proporzionale sopra il camino */
            min-width: 100px;
        }

        /* 🔘 PULSANTI CON GLOW CIRCOLARE (Scala ridotta) */
        .btn-frame {
            position: relative;
            width: 100%; height: 60px; /* Altezza ridotta dei pulsanti */
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            overflow: hidden;
            border-radius: 10px;
        }
        .btn-frame:hover { transform: scale(1.05); }

        /* 🎨 EFFETTO COLORE INTERNO (Scala ridotta) */
        .btn-frame::before {
            content: '';
            position: absolute;
            top: 20%; left: 10%; right: 10%; bottom: 20%;
            z-index: 1;
            background: radial-gradient(circle, var(--glow-color), transparent 70%);
            opacity: 0.7;
            filter: blur(10px); /* Sfocatura proporzionale */
        }

        .bg-amazon   { --glow-color: #ff9900; }
        .bg-twitch   { --glow-color: #9146ff; }
        .bg-discord  { --glow-color: #5865f2; }
        .bg-telegram { --glow-color: #0088cc; }

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 11px; /* Dimensione testo ridotta */
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }

        .cornice {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER FISSO */
        .footer-disclaimer {
            position: absolute;
            bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 10px;
            text-align: center;
            font-size: 10px; color: #aaa;
            z-index: 20;
            border-top: 1px solid #222;
        }

        /* MOBILE (Colonna singola sotto i conetti) */
        @media (max-width: 768px) {
            html, body { overflow: auto; }
            .content-area { flex-direction: column; top: 25vh; height: auto;}
            .column { width: 100%; max-width: 250px; margin-bottom: 15px;}
            .camino-spacer { display: none; }
            .footer-disclaimer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-container">
            <img src="img/testata.png" class="img-testata" alt="M4USS Braceria">
            <img src="img/cornice.png" class="cornice">
        </div>

        <div class="content-area">
            <div class="column">
                <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                    <span class="btn-text">!amazon</span>
                    <img src="img/cornice.png" class="cornice">
                </a>
                <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                    <span class="btn-text">!setup</span>
                    <img src="img/cornice.png" class="cornice">
                </a>
            </div>

            <div class="camino-spacer"></div>

            <div class="column">
                <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame bg-twitch">
                    <span class="btn-text">Twitch</span>
                    <img src="img/cornice.png" class="cornice">
                </a>
                <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame bg-discord">
                    <span class="btn-text">🥩 !discord 🥩</span>
                    <img src="img/cornice.png" class="cornice">
                </a>
                <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame bg-telegram">
                    <span class="btn-text">🍳 !telegram 🍳</span>
                    <img src="img/cornice.png" class="cornice">
                </a>
            </div>
        </div>

        <div class="footer-disclaimer">
            In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
            Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
        </div>
    </div>

</body>
</html>
