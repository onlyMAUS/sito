<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    
    <link rel="icon" type="image/png" href="img/Logo100.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 10px;
            font-family: sans-serif;
        }

        /* 🖼️ BOX COMUNE PER TESTATA E TWITCH */
        .frame-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Larghezza massima */
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Altezza specifica per la testata */
        .header-box { height: 160px; border-radius: 8px; }
        
        /* Altezza specifica per Twitch (proporzione 16:9) */
        .twitch-box { height: 340px; border-radius: 12px; }

        /* 🥩 IL RITAGLIO DELL'INSEGNA */
        .insegna-crop {
            position: absolute;
            width: 96%;
            height: 90%;
            overflow: hidden;
            z-index: 1;
        }
        .insegna-crop img {
            width: 100%;
            height: auto;
            transform: scale(3.2); /* Zoom sulla bistecca/M4USS */
            margin-top: 240px;      /* Centra l'insegna verticalmente */
            display: block;
        }

        /* 🎥 EMBED DI TWITCH */
        .twitch-embed {
            position: absolute;
            width: 94%;
            height: 88%;
            z-index: 1;
            border: none;
        }

        /* 🖼️ LA CORNICE (Stirata per entrambi) */
        .cornice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: fill; /* Adatta la cornice alla forma rettangolare */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="frame-container header-box">
        <div class="insegna-crop">
            <img src="img/offline.png" alt="M4USS Header">
        </div>
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

    <div class="frame-container twitch-box">
        <iframe
            src="https://player.twitch.tv/?channel=only_maus&parent=onlymaus.github.io&parent=onlymaus.it"
            class="twitch-embed"
            allowfullscreen>
        </iframe>
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

</body>
</html>
