<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Sito</title>
    <style>
        /* Reset e Font */
        body, h1, p { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1a1a1a; color: white; }

        /* Testata e Cornice Principale */
        .header-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 1920 / 558;
            margin: 0 auto;
        }
        .header-bg { width: 100%; height: 100%; object-fit: cover; display: block; }
        .header-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; object-fit: fill;
        }

        /* Animazione Titolo */
        .fading-title {
            text-align: center;
            margin: 30px 0;
            font-size: 2.5rem;
            animation: fadeOut 2s ease-in-out forwards;
            animation-delay: 2s;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }

        /* Container Pulsanti */
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- PULSANTI CON CORNICE PERSONALIZZATA --- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: transform 0.2s;
            min-width: 220px;
            cursor: pointer;

            /* Applicazione della tua cornice come bordo */
            border: 10px solid transparent; /* Spessore del bordo */
            border-image-source: url('img/cornice.png');
            border-image-slice: 30; /* Regola questo valore in base al disegno della cornice */
            border-image-repeat: round;
            
            background-clip: padding-box; /* Evita che lo sfondo copra la cornice */
        }

        .btn:hover { transform: scale(1.05); }

        /* Colori Brand */
        .btn-twitch { background-color: #9146FF; }
        .btn-discord { background-color: #5865F2; }
        .btn-telegram { background-color: #0088cc; }
        .btn-amazon { background-color: #FF9900; color: #000; }

        .btn img { height: 20px; margin-right: 10px; }

    </style>
</head>
<body>

    <header class="header-container">
        <img src="img/testata.png" alt="Sfondo Testata" class="header-bg">
        <img src="img/cornice.png" alt="Cornice" class="header-frame">
    </header>

    <h1 class="fading-title">Il Mio Sito</h1>

    <nav class="button-grid">
        
        <a href="https://twitch.tv/tuonome" class="btn btn-twitch">
            Twitch
        </a>

        <a href="https://discord.gg/invito" class="btn btn-discord">
            🥩🍳 Braceria 🍴🥩
        </a>

        <a href="https://t.me/tuocanale" class="btn btn-telegram">
            🥩🍳 Braceria 🍴🥩
        </a>

        <a href="https://www.amazon.it" class="btn btn-amazon">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt=""> !amazon
        </a>

        <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=mauriziopatet-21" class="btn btn-amazon">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt=""> !setup
        </a>

    </nav>

</body>
</html>
