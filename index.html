<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px; /* Distanza dall'alto del browser */
        }

        /* 1. Il Contenitore Master (Il Cerchio Magico) */
        .cornice-ritagliata-container {
            position: relative;
            width: 320px;  /* Dimensione totale della cornice */
            height: 320px;
            overflow: hidden; /* Taglia l'immagine dell'insegna a cerchio */
            border-radius: 50%; /* Lo rende un cerchio perfetto */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); /* Leggero bagliore per staccare dal nero */
        }

        /* 2. L'immagine dell'insegna (SOTTO) */
        .immagine-insegna-sfondo {
            position: absolute;
            width: 110%;  /* Leggermente più grande per coprire bene l'area interna */
            height: 110%;
            top: -5%;     /* Centra lo zoom */
            left: -5%;    /* Centra lo zoom */
            object-fit: cover;
            /* SEGRETO N.1: Posizionamento verticale preciso (28% tiene l'insegna alta) */
            object-position: center 28%; 
            z-index: 1;
        }

        /* 3. La cornice (SOPRA) */
        .immagine-cornice-sopra {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la cornice perfetta senza deformarla */
            z-index: 2;
            pointer-events: none; /* Rende la cornice 'trasparente' al click */
        }
    </style>
</head>
<body>

    <div class="cornice-ritagliata-container">
        <img src="img/offline.png" alt="M4USS" class="immagine-insegna-sfondo">
        
        <img src="img/cornice.png" alt="Cornice" class="immagine-cornice-sopra">
    </div>

</body>
</html>
