<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .header-crop {
            width: 90%;
            max-width: 500px;
            height: 150px; /* Ridotta ancora un po' per "chiudere" la visuale sul portone */
            overflow: hidden;
            position: relative;
            border: 2px solid #ffffff;
            border-radius: 4px;
            background-color: #1a1a1a;
        }

        .immagine-insegna {
            width: 100%;
            height: auto;
            display: block;
            
            /* 🛠️ REGOLAZIONE DI PRECISIONE */
            /* Aumentiamo lo zoom per tagliare i lati e il portone */
            transform: scale(2.2); 
            
            /* Aumentiamo il margine per spingere l'insegna M4USS nel centro.
               Se vedi ancora il portone, aumenta questo numero (es. 130px). */
            margin-top: 115px; 
        }
    </style>
</head>
<body>

    <div class="header-crop">
        <img src="img/offline.png" alt="M4USS Header" class="immagine-insegna">
    </div>

</body>
</html>
