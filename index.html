<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Sito</title>
    <style>
        /* Reset base */
        body, h1, p {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container della Testata */
        .header-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            height: auto;
            aspect-ratio: 1920 / 558;
            margin: 0 auto;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .header-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            object-fit: fill;
        }

        /* Contenuto */
        .content {
            padding: 40px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- ANIMAZIONE SVANIMENTO --- */
        h1 {
            color: #333;
            margin-bottom: 20px;
            /* L'animazione dura 2 secondi, inizia dopo 1 secondo di attesa */
            animation: fadeOut 2s ease-in-out forwards;
            animation-delay: 1s; 
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <img src="img/testata.png" alt="Sfondo Testata" class="header-bg">
        <img src="img/cornice.png" alt="Cornice Decorativa" class="header-frame">
    </header>

    <main class="content">
        <h1>Il Mio Sito</h1>
        <p>
            L'immagine sopra è 1920x558 con la sua cornice perfettamente sovrapposta.
            Il titolo qui sopra svanirà automaticamente dopo un breve ritardo.
        </p>
    </main>

</body>
</html>
