<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 BLOCCO TOTALE BARRE */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 📸 SFONDO CENTRATO */
        .bg-scena {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 🏗️ CONTENITORE GENERALE */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🥩 FIX TESTATA: NON SI MUOVE E NON SI SFORMA */
        .header-box {
            position: relative;
            width: 450px; height: 160px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-logo {
            width: 80%; /* Rimane dentro la cornice */
            z-index: 12;
            object-fit: contain;
        }

        /* 📐 POSIZIONAMENTO PULSANTI (Coordinate dirette) */
        .area-pulsanti {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; max-width: 1200px;
            height: 450px;
            pointer-events: none;
        }

        .btn {
            position: absolute;
            width: 270px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); }

        /* 📍 POSIZIONI SOTTO LE LUCI (FRECCE ROSSE) */
        /* Sinistra */
        .p-amazon { top: 0%; left: 5%; }
        .p-setup  { top: 30%; left: 5%; }
        .p-donazione { top: 60%; left: 5%; } /* Quello verde */

        /* Destra */
        .p-twitch  { top: 0%; right: 5%; }
        .p-discord { top: 30%; right: 5%; }
        .p-telegram { top: 60%; right: 5%; }

        /* 🎨 EFFETTI E CORNICI */
        .btn::before {
            content: ''; position: absolute;
            top: 20%; left: 15%; right: 15%; bottom: 20%;
            z-index: 1; opacity: 0.7; filter: blur(15px);
            background: radial-gradient(circle, var(--glow), transparent 70%);
        }
        .c-amazon { --glow: #ff9900; }
        .c-twitch { --glow: #9146ff; }
        .c-discord { --glow: #5865f2; }
        .c-telegram { --glow: #0088cc; }
        .c-verde { --glow: #2ecc71; } /* Colore 100 Euro */

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 13px;
            text-shadow: 2px 2px 4px #000;
        }

        .cornice-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER */
        .footer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); padding: 15px 0;
            text-align: center; font-size: 11px; color: #aaa;
            border-top: 1px solid #333;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            html, body { overflow-y: auto; }
            .area-pulsanti { position: relative; top: 0; left: 0; transform: none; display: flex; flex-direction: column; align-items: center; height: auto; margin-top: 40px; }
            .btn { position: relative; top: auto; left: auto; right: auto; margin-bottom: 20px; }
            .footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="bg-scena"></div>

    <div class="main-wrapper">
        <div class="header-box">
            <img src="img/testata.png" class="header-logo">
            <img src="img/cornice.png" class="cornice-img">
        </div>

        <div class="area-pulsanti">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn p-amazon c-amazon">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn p-setup c-amazon">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://streamelements.com/only_maus/tip" target="_blank" class="btn p-donazione c-verde">
                <span class="btn-text">💰 !donazione 💰</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>

            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn p-twitch c-twitch">
                <span class="btn-text">Twitch</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn p-discord c-discord">
                <span class="btn-text">🥩 Discord 🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn p-telegram c-telegram">
                <span class="btn-text">🍳 Telegram 🍳<br>!telegram</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
        </div>

        <div class="footer">
            In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
            Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
        </div>
    </div>

</body>
</html>
