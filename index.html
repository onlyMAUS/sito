<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it - Braceria</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 ZERO SCROLLBAR E RESET */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 📸 SFONDO FISSO */
        .scena {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 🏗️ CONTENITORE MASTER */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🥩 TESTATA (Alzata per liberare il camino) */
        .header-box {
            position: relative;
            width: 380px; height: 140px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-logo { width: 80%; z-index: 12; object-fit: contain; }

        /* 📐 AREA PULSANTI (Allargata a 1200px per stare ai lati) */
        .area-pulsanti {
            position: absolute;
            top: 52%; left: 50%;
            transform: translate(-50%, -50%);
            width: 1300px; /* <--- Questo "salta" il camino centrale */
            height: 400px;
            display: flex;
            justify-content: space-between; /* Spinge le colonne nei rettangoli colorati */
            pointer-events: none;
        }

        /* 🧱 COLONNE */
        .colonna {
            display: flex;
            flex-direction: column;
            gap: 40px;
            pointer-events: auto;
        }

        /* 🔘 PULSANTI SLIM (210px) */
        .btn {
            position: relative;
            width: 210px; height: 68px; 
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }

        /* 🎨 GLOW E COLORI */
        .btn::before {
            content: ''; position: absolute;
            top: 25%; left: 20%; right: 20%; bottom: 25%;
            z-index: 1; opacity: 0.7; filter: blur(12px);
            background: radial-gradient(circle, var(--glow), transparent 70%);
        }
        .c-amazon   { --glow: #ff9900; }
        .c-twitch   { --glow: #9146ff; }
        .c-discord  { --glow: #5865f2; }
        .c-telegram { --glow: #0088cc; }
        .c-verde    { --glow: #2ecc71; }

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        .cornice-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER */
        .footer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); padding: 12px 0;
            text-align: center; font-size: 10px; color: #aaa;
            border-top: 1px solid #333;
        }

        /* MOBILE FIX */
        @media (max-width: 1250px) {
            html, body { overflow-y: auto; }
            .area-pulsanti { position: relative; top: 0; left: 0; transform: none; flex-direction: column; align-items: center; width: 100%; height: auto; margin-top: 20px; gap: 20px; }
            .footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="scena"></div>

    <div class="main-wrapper">
        <div class="header-box">
            <img src="img/testata.png" class="header-logo">
            <img src="img/cornice.png" class="cornice-img">
        </div>

        <div class="area-pulsanti">
            <div class="colonna">
                <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn c-amazon">
                    <span class="btn-text">!amazon</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn c-amazon">
                    <span class="btn-text">!setup</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://streamelements.com/only_maus/tip" target="_blank" class="btn c-verde">
                    <span class="btn-text">💰 !donazione 💰</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
            </div>

            <div class="colonna">
                <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn c-twitch">
                    <span class="btn-text">Twitch</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn c-discord">
                    <span class="btn-text">🥩 !discord 🥩</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
                <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn c-telegram">
                    <span class="btn-text">🍳 !telegram 🍳</span>
                    <img src="img/cornice.png" class="cornice-img">
                </a>
            </div>
        </div>

        <div class="footer">
            In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
            Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
        </div>
    </div>

</body>
</html>
