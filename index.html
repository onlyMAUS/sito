<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 20px;
        }

        /* CONTENITORE GENERALE */
        .frame-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            /* Questo serve a non far sbordare le immagini */
            overflow: hidden; 
        }

        /* 1. TESTATA (M4USS) */
        .header-box {
            width: 400px; /* Larghezza proporzionata */
            height: 120px;
        }

        .insegna-crop {
            position: absolute;
            width: 88%; /* Lascia spazio ai bordi della cornice */
            height: 75%;
            overflow: hidden;
            z-index: 1;
        }

        .insegna-crop img {
            width: 100%;
            height: auto;
            /* REGOLAZIONE PERFETTA PER LA BISTECCA */
            transform: scale(2.4); 
            margin-top: 145px; 
            display: block;
        }

        /* 2. TWITCH BOX */
        .twitch-box {
            width: 600px;  /* Più grande come nello screenshot */
            height: 350px;
        }

        .twitch-embed {
            position: absolute;
            width: 92%;  /* Centrato dentro la cornice */
            height: 85%;
            z-index: 1;
            border: none;
            background: #000;
        }

        /* LA CORNICE (Sia sopra che sotto) */
        .cornice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: fill;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="frame-container header-box">
        <div class="insegna-crop">
            <img src="img/offline.png" alt="M4USS">
        </div>
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

    <div class="frame-container twitch-box">
        <iframe
            src="https://player.twitch.tv/?channel=only_maus&parent=onlymaus.github.io&parent=onlymaus.it"
            class="twitch-embed"
            allowfullscreen="true">
        </iframe>
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

</body>
</html>
