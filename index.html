<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* 🥩 LA CORNICE DEL RITAGLIO */
        .header-crop {
            width: 100%;
            max-width: 500px;    /* Stringiamo la visuale laterale */
            height: 180px;       /* Stringiamo la visuale verticale (niente portone) */
            overflow: hidden;    /* Fondamentale: nasconde tutto ciò che sta fuori */
            position: relative;
            border: 2px solid #ffffff;
            border-radius: 8px;  /* Angoli leggermente arrotondati, più moderno */
        }

        .immagine-insegna {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 🛠️ IL RITAGLIO VERO E PROPRIO */
            /* Inquadra la parte superiore (22%) e aumenta lo zoom (scale 1.5) */
            object-position: center 22%; 
            transform: scale(1.5); 
            display: block;
        }
    </style>
</head>
<body>

    <div class="header-crop">
        <img src="img/offline.png" alt="M4USS Header" class="immagine-insegna">
    </div>

</body>
</html>
