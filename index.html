<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    
    <link rel="icon" type="image/png" href="img/Logo100.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 10px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 🖼️ BOX RETTANGOLARI */
        .frame-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            overflow: hidden;
        }

        /* 🥩 TESTATA */
        .header-size {
            width: 100%;
            max-width: 480px;
            height: 140px;
        }

        .insegna-crop {
            position: absolute;
            width: 90%;
            height: 75%;
            overflow: hidden;
            z-index: 1;
        }

        .insegna-crop img {
            width: 100%;
            height: auto;
            transform: scale(2.6); 
            margin-top: 155px; 
            display: block;
        }

        /* 💜 PULSANTE TWITCH */
        .twitch-btn-box {
            width: 280px;
            height: 100px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .twitch-btn-box:hover {
            transform: scale(1.05);
        }

        .btn-text {
            position: absolute;
            z-index: 1;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0000; /* Richiama il neon rosso */
        }

        /* 🖼️ CORNICE NEON */
        .cornice-neon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: fill;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="frame-box header-size">
        <div class="insegna-crop">
            <img src="img/offline.png" alt="M4USS">
        </div>
        <img src="img/cornice.png" alt="Cornice" class="cornice-neon">
    </div>

    <a href="https://www.twitch.tv/only_maus" target="_blank" class="frame-box twitch-btn-box">
        <span class="btn-text">Entra in Live</span>
        <img src="img/cornice.png" alt="Cornice" class="cornice-neon">
    </a>

</body>
</html>
