<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 RESET E STOP SCROLLBAR */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 📸 SFONDO FISSO */
        .scena {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 🏗️ CONTENITORE MASTER CENTRATO */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🥩 TESTATA: Dimensioni bloccate per non sparire */
        .header-box {
            position: relative;
            width: 380px; /* Dimensione ideale per entrambi i monitor */
            height: 140px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-logo {
            width: 82%; 
            z-index: 12;
            object-fit: contain;
        }

        /* 📐 AREA PULSANTI SOPRA IL CAMINO */
        /* Usiamo pixel fissi per il contenitore per evitare che i pulsanti "ballino" */
        .area-pulsanti {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -42%);
            width: 900px; /* Larghezza fissa: i pulsanti staranno SEMPRE ai lati del camino */
            height: 400px;
            pointer-events: none;
        }

        .btn {
            position: absolute;
            width: 240px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); }

        /* 📍 COORDINATE FISSE (Addio percentuali pazze) */
        /* Sinistra */
        .p-amazon    { top: 10px; left: 0; }
        .p-setup     { top: 100px; left: 0; }
        .p-donazione { top: 190px; left: 0; }

        /* Destra */
        .p-twitch    { top: 10px; right: 0; }
        .p-discord   { top: 100px; right: 0; }
        .p-telegram  { top: 190px; right: 0; }

        /* 🎨 GLOW E COLORI */
        .btn::before {
            content: ''; position: absolute;
            top: 25%; left: 15%; right: 15%; bottom: 25%;
            z-index: 1; opacity: 0.7; filter: blur(15px);
            background: radial-gradient(circle, var(--glow), transparent 70%);
        }
        .c-amazon   { --glow: #ff9900; }
        .c-twitch   { --glow: #9146ff; }
        .c-discord  { --glow: #5865f2; }
        .c-telegram { --glow: #0088cc; }
        .c-verde    { --glow: #2ecc71; } /* Il verde smeraldo */

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 11px;
            text-shadow: 2px 2px 4px #000;
            line-height: 1.2;
        }

        .cornice-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER */
        .footer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); padding: 12px 0;
            text-align: center; font-size: 10px; color: #aaa;
            border-top: 1px solid #333;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            html, body { overflow-y: auto; }
            .area-pulsanti { position: relative; top: 0; left: 0; transform: none; display: flex; flex-direction: column; align-items: center; width: 100%; height: auto; margin-top: 40px; }
            .btn { position: relative; top: auto; left: auto; right: auto; margin-bottom: 20px; }
            .footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="scena"></div>

    <div class="main-wrapper">
        <div class="header-box">
            <img src="img/testata.png" class="header-logo">
            <img src="img/cornice.png" class="cornice-img">
        </div>

        <div class="area-pulsanti">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn p-amazon c-amazon">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn p-setup c-amazon">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://streamelements.com/only_maus/tip" target="_blank" class="btn p-donazione c-verde">
                <span class="btn-text">💰 !donazione 💰</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>

            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn p-twitch c-twitch">
                <span class="btn-text">Twitch</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn p-discord c-discord">
                <span class="btn-text">🥩 Discord 🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn p-telegram c-telegram">
                <span class="btn-text">🍳 Telegram 🍳<br>!telegram</span>
                <img src="img/cornice.png" class="cornice-img">
            </a>
        </div>

        <div class="footer">
            In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
            Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
        </div>
    </div>

</body>
</html>
