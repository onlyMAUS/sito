<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* La cornice che fa da "maschera" */
        .header-crop {
            width: 90%;
            max-width: 500px;
            height: 160px; /* Altezza ridotta per essere sicuri di tagliare il portone */
            overflow: hidden;
            position: relative;
            border: 2px solid #ffffff;
            border-radius: 4px;
        }

        .immagine-insegna {
            width: 100%;
            height: auto; /* Manteniamo le proporzioni originali */
            display: block;
            
            /* 🛠️ CONTROLLO MANUALE */
            transform: scale(1.8); /* Zoom deciso sull'insegna */
            
            /* Spostiamo l'immagine: 
               Il secondo valore (70px) sposta l'immagine verso il BASSO.
               Se vedi ancora il portone, aumenta questo numero (es. 90px).
               Se vedi il cielo sopra l'insegna, diminuiscilo (es. 50px). */
            margin-top: 70px; 
        }
    </style>
</head>
<body>

    <div class="header-crop">
        <img src="img/offline.png" alt="M4USS Header" class="immagine-insegna">
    </div>

</body>
</html>
