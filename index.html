<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            /* SFONDO */
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 50px;
        }

        /* IL CONTENITORE DELLA TESTATA */
        .header-wrapper {
            position: relative;
            width: 95%;
            max-width: 500px; /* Larghezza del rettangolo */
            height: 160px;    /* Altezza del rettangolo */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px; /* Arrotondiamo un po' gli angoli */
        }

        /* IL RITAGLIO DELL'INSEGNA (Livello sotto) */
        .insegna-crop {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .insegna-crop img {
            width: 100%;
            height: auto;
            /* 🥩 REGOLAZIONE DI PRECISIONE 🥩 */
            /* Aumentiamo lo zoom (3.5) per vedere bene la bistecca */
            transform: scale(3.5); 
            /* Spingiamo l'immagine molto più in basso (260px) per centrare l'insegna */
            margin-top: 260px; 
            display: block;
        }

        /* LA CORNICE (Livello sopra) */
        .cornice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: fill; /* Adatta la cornice alla forma rettangolare */
            pointer-events: none;
            /* Aggiungiamo un po' di ombra per far risaltare l'insegna */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="insegna-crop">
            <img src="img/offline.png" alt="M4USS">
        </div>
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

</body>
</html>
