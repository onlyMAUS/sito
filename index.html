<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 ZERO SCROLLBAR */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* 📸 SFONDO FISSO CENTRATO */
        .scena {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 🏗️ AREA PULSANTI (Ancorata al centro della foto) */
        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%); /* Spostato per stare sotto le luci */
            width: 100%; max-width: 1400px;
            height: 80vh;
            z-index: 10;
            pointer-events: none;
        }

        /* 🥩 TESTATA */
        .header-box {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 400px;
            pointer-events: auto;
        }

        /* 🔘 STILE PULSANTI */
        .btn-frame {
            position: absolute;
            width: 260px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            pointer-events: auto;
        }
        .btn-frame:hover { transform: scale(1.05); }

        /* 📍 COORDINATE CHIRURGICHE (Sotto le luci) */
        /* Sinistra */
        .pos-amazon    { top: 30%; left: 8%; }
        .pos-setup     { top: 48%; left: 8%; }
        .pos-donazione { top: 66%; left: 8%; } /* Nuovo pulsante verde */

        /* Destra */
        .pos-twitch    { top: 30%; right: 8%; }
        .pos-discord   { top: 48%; right: 8%; }
        .pos-telegram  { top: 66%; right: 8%; }

        /* 🎨 GLOW E COLORI */
        .btn-frame::before {
            content: '';
            position: absolute;
            top: 25%; left: 20%; right: 20%; bottom: 25%;
            z-index: 1;
            background: radial-gradient(circle, var(--c), transparent 70%);
            opacity: 0.7; filter: blur(15px);
        }
        .bg-amazon   { --c: #ff9900; }
        .bg-twitch   { --c: #9146ff; }
        .bg-discord  { --c: #5865f2; }
        .bg-telegram { --c: #0088cc; }
        .bg-verde    { --c: #2ecc71; } /* Verde 100 Euro */

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 13px;
            text-shadow: 2px 2px 4px #000;
        }

        .cornice {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* 📝 FOOTER */
        .footer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.85); padding: 12px 0;
            text-align: center; font-size: 11px; color: #bbb;
            z-index: 20; border-top: 1px solid #333;
        }

        /* MOBILE FIX */
        @media (max-width: 900px) {
            html, body { overflow-y: auto; }
            .overlay { position: relative; top: 0; left: 0; transform: none; height: auto; display: flex; flex-direction: column; align-items: center; padding-top: 150px; }
            .btn-frame { position: relative; top: auto; left: auto; right: auto; margin-bottom: 20px; }
            .footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="scena"></div>

    <div class="overlay">
        <div class="header-box">
            <img src="img/testata.png" style="width:100%;">
            <img src="img/cornice.png" class="cornice">
        </div>

        <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame pos-amazon bg-amazon">
            <span class="btn-text">!amazon</span>
            <img src="img/cornice.png" class="cornice">
        </a>

        <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame pos-setup bg-amazon">
            <span class="btn-text">!setup</span>
            <img src="img/cornice.png" class="cornice">
        </a>

        <a href="https://streamelements.com/only_maus/tip" target="_blank" class="btn-frame pos-donazione bg-verde">
            <span class="btn-text">💰 !donazione 💰</span>
            <img src="img/cornice.png" class="cornice">
        </a>

        <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame pos-twitch bg-twitch">
            <span class="btn-text">Twitch</span>
            <img src="img/cornice.png" class="cornice">
        </a>

        <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame pos-discord bg-discord">
            <span class="btn-text">🥩 Discord 🥩<br>!discord</span>
            <img src="img/cornice.png" class="cornice">
        </a>

        <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame pos-telegram bg-telegram">
            <span class="btn-text">🍳 Telegram 🍳<br>!telegram</span>
            <img src="img/cornice.png" class="cornice">
        </a>
    </div>

    <div class="footer">
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
        Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
    </div>

</body>
</html>
