<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .profile-container {
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .amazon-btn {
            display: inline-block;
            padding: 18px 35px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            border: 2px solid #ffffff;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .amazon-btn:hover {
            background-color: #ffffff;
            color: #000000;
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.3);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 90%;
            text-align: center;
            font-size: 0.75rem;
            color: #666666; /* Grigio scuro per non distrarre */
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://mausstore.it/img/cornice-web.png" alt="Logo" class="profile-pic">
    </div>

    <a href="https://www.amazon.it/?tag=onlymaus-21" target="_blank" class="amazon-btn">
        ⭐ <span style="margin: 0 5px;">Aggiungi ai preferiti</span> 🔖
    </a>

    <footer>
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei.
    </footer>

</body>
</html>
