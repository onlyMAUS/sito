<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TESTATA */
        .header-container {
            position: relative;
            width: 450px;
            height: 150px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .img-testata { width: 85%; z-index: 11; }

        /* LAYOUT A TRE COLONNE PER SALVARE IL CAMINO */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr; /* Colonna centrale più larga per il camino */
            width: 95%;
            max-width: 1400px;
            margin-top: 100px; /* Altezza regolata sotto le applique */
            flex-grow: 1;
            align-items: start;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .center-gap {
            /* Questa colonna resta vuota per mostrare il camino */
            pointer-events: none;
        }

        /* PULSANTI */
        .btn-frame {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 85px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
            margin: 0 auto;
        }

        .btn-frame:hover { transform: scale(1.05); }

        .btn-text {
            z-index: 5;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        .cornice {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4;
            object-fit: fill;
            pointer-events: none;
        }

        /* COLORI GRADIENTI */
        .bg-amazon { background: linear-gradient(to top, rgba(255, 153, 0, 0.5), transparent); }
        .bg-twitch { background: linear-gradient(to top, rgba(145, 70, 255, 0.5), transparent); }
        .bg-discord { background: linear-gradient(to top, rgba(88, 101, 242, 0.5), transparent); }
        .bg-telegram { background: linear-gradient(to top, rgba(0, 136, 204, 0.5), transparent); }

        /* LIVE DOT */
        .live-dot {
            height: 8px; width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* FOOTER */
        .footer-disclaimer {
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 10px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 40px;
        }

        /* RESPONSIVE PER MOBILE */
        @media (max-width: 1000px) {
            .main-content { 
                grid-template-columns: 1fr; 
                margin-top: 40px;
            }
            .center-gap { display: none; }
            .column { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="img/testata.png" class="img-testata" alt="M4USS">
        <img src="img/cornice.png" class="cornice" alt="Cornice">
    </div>

    <div class="main-content">
        <div class="column">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>

        <div class="center-gap"></div>

        <div class="column">
            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame bg-twitch">
                <span class="btn-text"><span class="live-dot"></span>Twitch</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame bg-discord">
                <span class="btn-text">🥩 Braceria Discord 🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame bg-telegram">
                <span class="btn-text">🍳 Braceria Telegram 🍳<br>!telegram</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>
    </div>

    <div class="footer-disclaimer">
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
        Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
    </div>

</body>
</html>
