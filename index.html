<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it - Braceria</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        /* 🛑 BLOCHIAMO LE BARRE DI SCORRIMENTO */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden; /* Elimina scrollbar alto/basso e destra/sinistra */
            background-color: #000;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 📸 LO SFONDO CHE FA DA SCENOGRAFIA (SENZA BARRE) */
        .scenografia {
            position: absolute;
            width: 100%; height: 100vh;
            background-image: url('img/torno%20subito.png');
            background-size: cover; /* Si adatta perfettamente senza sgranare */
            background-position: center; /* Centrato per 2K e 1080p */
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 🥩 TESTATA SEMPRE AL CENTRO TRA LE LUCI */
        .header-container {
            position: relative;
            width: 90%; max-width: 450px; height: 15vh; /* Altezza basata sullo schermo */
            margin-top: 2vh; /* Centrata tra i coni di luce */
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }
        .img-testata { width: 85%; z-index: 11; object-fit: contain; }

        /* 🧱 AREA DI ANCORAGGIO: IL CUORE DEL FIX */
        .area-ancoraggio {
            position: absolute;
            top: 50%; left: 50%; /* Centrata esattamente sopra il camino */
            transform: translate(-50%, -35%); /* Allineata sopra il fuoco */
            width: 100%; max-width: 1300px; /* Limite per monitor 2K */
            height: 350px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Tre colonne per salvare il centro */
            gap: 20px;
            pointer-events: none; /* Non blocca i click */
            z-index: 5;
        }

        .column { display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .col-sinistra { align-items: flex-start; padding-left: 20px; }
        .col-destra { align-items: flex-end; padding-right: 20px; }
        .col-vuota { pointer-events: none; } /* Spazio per il camino */

        /* 🔘 PULSANTI INCORNICIATI E COLORATI */
        .btn-frame {
            position: relative;
            width: 280px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            overflow: hidden; border-radius: 12px;
        }
        .btn-frame:hover { transform: scale(1.03); }

        /* 🎨 EFFETTO GLOW INTEGRATO */
        .btn-frame::before {
            content: '';
            position: absolute;
            top: 20%; left: 20%; right: 20%; bottom: 20%;
            z-index: 1; clip-path: ellipse(45% 40% at 50% 50%);
            opacity: 0.6; filter: blur(15px);
        }

        .bg-amazon::before { background: radial-gradient(circle, #ff9900, transparent); }
        .bg-twitch::before { background: radial-gradient(circle, #9146ff, transparent); }
        .bg-discord::before { background: radial-gradient(circle, #5865f2, transparent); }
        .bg-telegram::before { background: radial-gradient(circle, #0088cc, transparent); }

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 13px;
            text-shadow: 1px 1px 3px rgba(0,0,0,1); padding: 0 10px;
        }

        .cornice { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; object-fit: fill; pointer-events: none; }

        /* 📝 FOOTER FISSO (SENZA BARRE) */
        .footer-disclaimer {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); padding: 15px 0;
            text-align: center; font-size: 11px; color: #aaa;
            z-index: 20; border-top: 1px solid #222;
        }

        /* 📱 MOBILE FIX (SOTTO I 1000px) */
        @media (max-width: 1000px) {
            .scenografia { background-attachment: scroll; overflow-y: auto; }
            html, body { overflow: auto; }
            .area-ancoraggio { position: relative; top: auto; left: auto; transform: none; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
            .btn-frame { position: relative; top: auto; left: auto; right: auto; margin-bottom: 20px; }
            .col-vuota { display: none; }
            .footer-disclaimer { position: relative; margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="scenografia"></div> <div class="header-container">
        <img src="img/testata.png" class="img-testata" alt="M4USS Braceria">
        <img src="img/cornice.png" class="cornice">
    </div>

    <div class="area-ancoraggio">
        
        <div class="column col-sinistra">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>

        <div class="col-vuota"></div>

        <div class="column col-destra">
            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame bg-twitch">
                <span class="btn-text">Twitch</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame bg-discord">
                <span class="btn-text">🥩 Braceria Discord 🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame bg-telegram">
                <span class="btn-text">🍳 Braceria Telegram 🍳<br>!telegram</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>
    </div>

    <div class="footer-disclaimer">
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
        Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
    </div>

</body>
</html>
