<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    
    <link rel="icon" type="image/png" href="img/Logo100.png">

    <style>
        /* 1. RESET E SFONDO GENERALE */
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. CONTENITORE DELLA TESTATA (L'OBLO') */
        .header-container {
            position: relative;
            width: 320px; 
            height: 320px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Taglia l'immagine dell'insegna seguendo il bordo della cornice */
            overflow: hidden;
            border-radius: 50%;
        }

        /* 3. L'INSEGNA M4USS (DENTRO L'OBLO') */
        .insegna-image {
            position: absolute;
            width: 100%;
            height: auto;
            
            /* 🥩 REGOLAZIONE DI PRECISIONE PER CENTRARE LA BISTECCA 🥩 */
            /* Aumentiamo lo zoom per isolare la M e la scritta */
            transform: scale(2.6); 
            
            /* Regola 'top' per far scendere l'insegna e nascondere il portone.
               Se vedi ancora il portone, aumenta a 170px.
               Se tagli la scritta M4USS, scendi a 140px. */
            top: 158px; 
            left: 0;
            
            z-index: 1;
            display: block;
        }

        /* 4. LA CORNICE (SOPRA L'INSEGNA) */
        .cornice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: contain; /* Mantiene la forma perfetta della cornice */
            pointer-events: none; /* Non intralcia il click/tocco */
        }

        /* 5. SPAZIO PER I CONTENUTI FUTURI */
        .content {
            margin-top: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            color: white;
            z-index: 10;
        }

    </style>
</head>
<body>

    <div class="header-container">
        <img src="img/offline.png" alt="M4USS Insegna" class="insegna-image">
        
        <img src="img/cornice.png" alt="Cornice" class="cornice-overlay">
    </div>

    <div class="content">
        </div>

</body>
</html>
