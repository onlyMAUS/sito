<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            /* 🥩 LO SFONDO PRINCIPALE */
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* L'immagine resta ferma */
            background-color: #000;
            
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            font-family: Arial, sans-serif;
        }

        /* 🖼️ LA TESTATA INCORNICIATA */
        .header-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Il ritaglio dell'insegna M4USS */
        .insegna-box {
            position: absolute;
            width: 80%;
            height: 80%;
            overflow: hidden;
            z-index: 1;
        }

        .insegna-box img {
            width: 100%;
            height: auto;
            transform: scale(2.8); /* Zoom sull'insegna */
            margin-top: 185px;     /* Sposta l'immagine per centrare la scritta */
            display: block;
        }

        /* La cornice sopra il ritaglio */
        .cornice-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: fill; /* Adatta la cornice al rettangolo */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="insegna-box">
            <img src="img/offline.png" alt="Insegna M4USS">
        </div>
        <img src="img/cornice.png" alt="Cornice" class="cornice-img">
    </div>

</body>
</html>
