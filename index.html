<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        body {
            margin: 0; padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover; background-position: center;
            background-attachment: fixed; background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* TESTATA */
        .header-container {
            position: relative; width: 450px; height: 150px;
            margin-top: 20px; display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }
        .img-testata { width: 85%; z-index: 11; }

        /* 📐 LAYOUT IBRIDO 2K / 1080p */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1300px; /* Perfetto per non disperdersi sul 2K */
            margin-top: 5vh; /* Usa unità basate sull'altezza schermo per allinearsi alle lampade */
            flex-grow: 1;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .column { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 300px; /* Larghezza fissa per mantenere le proporzioni della cornice */
        }

        /* 🧱 SPAZIO DINAMICO PER IL CAMINO */
        .center-gap { 
            flex: 1; /* Si espande per riempire il centro */
            max-width: 450px; /* Non lascia che i pulsanti si allontanino troppo sul 2K */
            min-width: 200px; /* Non lascia che si schiaccino sul 1080p */
        }

        /* 🔘 PULSANTI */
        .btn-frame {
            position: relative;
            width: 100%; height: 85px;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; transition: transform 0.2s;
            overflow: hidden;
        }
        .btn-frame:hover { transform: scale(1.05); }

        /* 🎨 GLOW INTERNO */
        .btn-frame::before {
            content: '';
            position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 15%;
            z-index: 1;
            clip-path: ellipse(42% 38% at 50% 50%);
            opacity: 0.65;
            filter: blur(12px);
        }

        .bg-amazon::before { background: radial-gradient(circle, #ff9900, transparent); }
        .bg-twitch::before { background: radial-gradient(circle, #9146ff, transparent); }
        .bg-discord::before { background: radial-gradient(circle, #5865f2, transparent); }
        .bg-telegram::before { background: radial-gradient(circle, #0088cc, transparent); }

        .btn-text {
            z-index: 5; color: #fff; font-weight: bold;
            text-transform: uppercase; text-align: center; font-size: 13px;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
            padding: 0 10px;
        }

        .cornice {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; object-fit: fill; pointer-events: none;
        }

        /* FOOTER */
        .footer-disclaimer {
            width: 100%; background: rgba(0, 0, 0, 0.9);
            padding: 25px 10px; text-align: center; font-size: 12px;
            color: #aaa; margin-top: 50px;
            border-top: 1px solid #333;
        }

        /* MOBILE FIX */
        @media (max-width: 1000px) {
            .main-content { flex-direction: column; align-items: center; margin-top: 40px; }
            .center-gap { display: none; }
            .column { width: 100%; max-width: 320px; margin-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="img/testata.png" class="img-testata" alt="M4USS">
        <img src="img/cornice.png" class="cornice">
    </div>

    <div class="main-content">
        <div class="column">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame bg-amazon">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>

        <div class="center-gap"></div>

        <div class="column">
            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame bg-twitch">
                <span class="btn-text">Twitch</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame bg-discord">
                <span class="btn-text">🥩 Braceria Discord 🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame bg-telegram">
                <span class="btn-text">🍳 Braceria Telegram 🍳<br>!telegram</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>
    </div>

    <div class="footer-disclaimer">
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
        Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
    </div>

</body>
</html>
