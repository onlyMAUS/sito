<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="img/Logo100.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 10px;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }

        /* STRUTTURA BOX INCORNICIATI */
        .frame-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .frame-box:hover { 
            transform: scale(1.03); 
        }

        /* 🥩 TESTATA - RITAGLIO CHIRURGICO */
        .header-size { 
            height: 140px; 
            margin-bottom: 30px; 
        }

        .insegna-crop {
            position: absolute;
            width: 90%;
            height: 85%; /* Altezza aumentata per non tagliare la bistecca */
            overflow: hidden;
            z-index: 1;
            display: flex;
            justify-content: center;
        }

        .insegna-crop img {
            width: 100%;
            height: auto;
            transform: scale(2.5); /* Zoom perfetto per M4USS */
            margin-top: 142px;      /* Centratura verticale precisa */
            display: block;
        }

        /* 🔘 STILE PULSANTI */
        .btn-size { 
            height: 85px; 
        }

        .btn-content {
            display: flex;
            align-items: center;
            z-index: 3;
            width: 85%;
        }

        .btn-icon { 
            width: 32px; 
            height: 32px; 
            margin-right: 15px; 
            fill: #fff; 
            flex-shrink: 0; 
        }

        .btn-text {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #ff0000;
        }

        /* 🖼️ CORNICE NEON (Sopra tutto) */
        .cornice-neon {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: 2; 
            object-fit: fill; 
            pointer-events: none;
        }

        /* 📝 DISCLAIMER */
        .disclaimer {
            max-width: 480px;
            text-align: center;
            font-size: 12px;
            line-height: 1.6;
            margin-top: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 1px solid #333;
            color: #aaa;
        }

        .disclaimer strong { 
            color: #fff; 
        }
    </style>
</head>
