<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <link rel="icon" type="image/png" href="img/Logo100.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('img/torno%20subito.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TESTATA IN ALTO */
        .header-container {
            position: relative;
            width: 450px;
            height: 150px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-testata {
            width: 85%;
            z-index: 1;
        }

        /* LAYOUT A COLONNE PER I PULSANTI */
        .main-content {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 1200px;
            margin-top: 50px;
            flex-grow: 1;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 300px;
        }

        /* PULSANTI INCORNICIATI */
        .btn-frame {
            position: relative;
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .btn-frame:hover {
            transform: scale(1.05);
        }

        .btn-text {
            z-index: 2;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            font-size: 14px;
            padding: 0 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .cornice {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            object-fit: fill;
            pointer-events: none;
        }

        /* INDICATORE LIVE TWITCH */
        .live-dot {
            height: 10px;
            width: 10px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* DISCLAIMER IN BASSO */
        .footer-disclaimer {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 0;
            text-align: center;
            font-size: 13px;
            color: #ccc;
            margin-top: 50px;
        }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; align-items: center; }
            .column { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="img/testata.png" class="img-testata" alt="M4USS">
        <img src="img/cornice.png" class="cornice" alt="Cornice">
    </div>

    <div class="main-content">
        <div class="column">
            <a href="https://www.amazon.it/index.html?tag=onlymaus-21" target="_blank" class="btn-frame">
                <span class="btn-text">!amazon</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://www.amazon.it/hz/wishlist/ls/1UN05MW61D27C?tag=onlymaus-21" target="_blank" class="btn-frame">
                <span class="btn-text">!setup</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>

        <div class="column">
            <a href="https://www.twitch.tv/only_maus/" target="_blank" class="btn-frame">
                <span class="btn-text"><span class="live-dot"></span>Twitch</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://discord.gg/AwZ3Sa2m8f" target="_blank" class="btn-frame">
                <span class="btn-text">🥩🍳 Braceria 🍴🥩<br>!discord</span>
                <img src="img/cornice.png" class="cornice">
            </a>
            <a href="https://t.me/+t2VmbKd9WKwzNzJk" target="_blank" class="btn-frame">
                <span class="btn-text">🥩🍳 Braceria 🍴🥩<br>!telegram</span>
                <img src="img/cornice.png" class="cornice">
            </a>
        </div>
    </div>

    <div class="footer-disclaimer">
        In qualità di Affiliato Amazon, ricevo un guadagno dagli acquisti idonei. <br>
        Il dominio <strong>mausstore.it</strong> è di proprietà esclusiva di Maurizio Patete.
    </div>

</body>
</html>
