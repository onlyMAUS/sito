<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlymaus.it</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* La "finestra" che ritaglia l'immagine */
        .header-ritagliato {
            width: 100%;
            height: 200px; /* Altezza del taglio per escludere il portone */
            overflow: hidden;
            position: relative;
            border-bottom: 2px solid #1a1a1a; /* Linea sottile di stacco */
        }

        .header-ritagliato img {
            width: 100%;
            height: 100%;
            /* 'cover' riempie lo spazio, 'top' tiene l'insegna ed esclude il basso */
            object-fit: cover;
            object-position: top; 
        }
    </style>
</head>
<body>

    <header class="header-ritagliato">
        <img src="https://mausstore.it/img/header.png" alt="M4USS Header">
    </header>

</body>
</html>
